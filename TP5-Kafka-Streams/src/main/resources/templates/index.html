<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Click Counter - Kafka</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 80px; }
        #clickBtn {
            padding: 20px 40px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
        }
        #clickBtn:hover { background-color: #45a049; }
        #status { margin-top: 20px; font-size: 16px; color: #333; }
    </style>
</head>
<body>
    <h1>Compteur de Clics Kafka</h1>
    <button id="clickBtn" onclick="sendClick()">Cliquez ici</button>
    <p id="status"></p>

    <script>
        let localCount = 0;
        function sendClick() {
            fetch('/click', { method: 'POST' })
                .then(response => response.text())
                .then(() => {
                    localCount++;
                    document.getElementById('status').textContent =
                        'Clics envoyés vers Kafka : ' + localCount;
                })
                .catch(err => {
                    document.getElementById('status').textContent = 'Erreur : ' + err;
                });
        }
    </script>
</body>
</html>
